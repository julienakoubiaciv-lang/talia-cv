<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1539B7"/>
      <stop offset="1" stop-color="#0B1638"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#2ED3A8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2ED3A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.12" cy="0.92" r="0.6">
      <stop offset="0" stop-color="#7048E8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7048E8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Marque -->
  <g transform="translate(90, 92)">
    <rect width="74" height="74" rx="18" fill="#ffffff"/>
    <text x="37" y="53" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#1539B7" text-anchor="middle">A</text>
    <text x="98" y="50" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-1">Altio <tspan fill="#9FB4FF">CV</tspan></text>
  </g>

  <!-- Titre -->
  <text x="90" y="296" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff" letter-spacing="-2">Crée ton CV.</text>
  <text x="90" y="384" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff" letter-spacing="-2">Décroche ton poste.</text>

  <!-- Sous-titre -->
  <text x="92" y="448" font-family="Arial, sans-serif" font-size="30" font-weight="500" fill="#C8D3F5">Générateur de CV gratuit + entrainement entretien, tests et oral.</text>

  <!-- Chips -->
  <g font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">
    <g transform="translate(90, 508)">
      <rect width="168" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="84" y="37" text-anchor="middle">Entretien</text>
    </g>
    <g transform="translate(276, 508)">
      <rect width="208" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="104" y="37" text-anchor="middle">Tests de recrut.</text>
    </g>
    <g transform="translate(502, 508)">
      <rect width="120" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="60" y="37" text-anchor="middle">Oral</text>
    </g>
    <g transform="translate(640, 508)">
      <rect width="200" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="100" y="37" text-anchor="middle">Employabilite</text>
    </g>
  </g>

  <!-- Marque décorative -->
  <g transform="translate(820, 150)" opacity="0.10">
    <rect width="300" height="300" rx="80" fill="none" stroke="#ffffff" stroke-width="22"/>
    <text x="150" y="218" font-family="Arial, sans-serif" font-size="230" font-weight="800" fill="#ffffff" text-anchor="middle">A</text>
  </g>
</svg>
